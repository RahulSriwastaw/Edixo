version: 1
applications:
  - appRoot: mokebook
    frontend:
      phases:
        preBuild:
          commands:
            # The Trick: Move super_admin files into the folder Amplify expects (mokebook)
            - cd ..
            - rm -rf mokebook/*
            - cp -R super_admin/* mokebook/
            - cd mokebook
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

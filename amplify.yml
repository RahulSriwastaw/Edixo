version: 1
applications:
  - appRoot: mokebook
    frontend:
      phases:
        preBuild:
          commands:
            - cd ..
            - rm -rf mokebook/*
            - cp -R whiteboard/* mokebook/
            - cd mokebook
            - git clone --depth 1 https://github.com/flutter/flutter.git -b stable $HOME/flutter
            - export PATH="$PATH:$HOME/flutter/bin"
            - flutter pub get
            - npm install next
        build:
          commands:
            - flutter build web
            # Final Hack: Move everything into a fake .next folder to satisfy Amplify
            - mkdir -p .next
            - cp -r build/web/* .next/
            - echo '{"version":1,"config":{"distDir":".next"},"appDir":"/","files":[],"ignore":[]}' > .next/required-server-files.json
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'

version: 1
applications:
  - appRoot: mokebook
    frontend:
      phases:
        preBuild:
          commands:
            # Move whiteboard files into the folder Amplify expects (mokebook)
            - cd ..
            - rm -rf mokebook/*
            - cp -R whiteboard/* mokebook/
            - cd mokebook
            # Replace localhost with production backend URL
            - sed -i 's|http://localhost:4000/api|https://edixo.onrender.com/api|g' lib/core/constants/api_constants.dart
            - git clone --depth 1 https://github.com/flutter/flutter.git -b stable $HOME/flutter
            - export PATH="$PATH:$HOME/flutter/bin"
            - flutter pub get
            # Satisfy Amplify Next.js SSR bundler check
            - npm install next
        build:
          commands:
            - flutter build web
      artifacts:
        baseDirectory: build/web
        files:
          - '**/*'

version: 1
applications:
  - appRoot: mokebook
    frontend:
      phases:
        preBuild:
          commands:
            # Move whiteboard files into the folder Amplify expects (mokebook)
            - cd ..
            - rm -rf mokebook/*
            - cp -R whiteboard/* mokebook/
            - cd mokebook
            - git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter
            - export PATH="$PATH:$HOME/flutter/bin"
            - flutter pub get
        build:
          commands:
            - flutter build web
      artifacts:
        baseDirectory: build/web
        files:
          - '**/*'

version: 1
applications:
  - appRoot: whiteboard
    frontend:
      phases:
        preBuild:
          commands:
            - git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter
            - export PATH="$PATH:$HOME/flutter/bin"
            - flutter doctor
        build:
          commands:
            - flutter build web
      artifacts:
        baseDirectory: build/web
        files:
          - '**/*'

name: eduboard_pro
description: EduBoard Pro v3 — Interactive Whiteboard for Coaching Institutes

publish_to: 'none'

version: 3.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Canvas & Drawing ──────────────────────────────────────────────
  perfect_freehand: ^2.0.1        # Smooth pen stroke rendering

  # ── Data & Persistence ────────────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.3.3

  # ── Networking ────────────────────────────────────────────────────
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^6.0.3

  # ── UI & Fonts ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.1.0
  flutter_html: ^3.0.0-beta.2     # Use Html() widget from this package

  # ── Export ────────────────────────────────────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0
  archive: ^3.4.10
  path_provider: ^2.1.3
  file_picker: ^8.0.3

  # ── Result Type ───────────────────────────────────────────────────
  result_dart: ^1.1.0             # Result<Success, Failure>

  # ── Routing ───────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── AI Integration ────────────────────────────────────────────────
  http: ^1.2.1

  # ── Desktop Utilities ─────────────────────────────────────────────
  hotkey_manager: ^0.2.2
  window_manager: ^0.3.9
  screen_retriever: ^0.1.9
  flutter_screenutil: ^5.9.3
  pdfx: ^2.9.2

dev_dependencies:
  riverpod_generator: ^2.3.2
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
